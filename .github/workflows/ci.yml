name: CI
on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [8.2, 8.3, 8.4]
        laravel: ["^10.0", "^11.0", "^12.0", "^13.0"]
        dependency-version: [prefer-lowest, prefer-stable]
        exclude:
          # Laravel 13 requires PHP 8.3+
          - php: 8.2
            laravel: "^13.0"
          # Exclude prefer-lowest for Laravel 10 & 11 due to Pest/PHPUnit compatibility issues
          - php: 8.2
            laravel: "^10.0"
            dependency-version: prefer-lowest
          - php: 8.2
            laravel: "^11.0"
            dependency-version: prefer-lowest
          - php: 8.3
            laravel: "^10.0"
            dependency-version: prefer-lowest
          - php: 8.3
            laravel: "^11.0"
            dependency-version: prefer-lowest
          - php: 8.4
            laravel: "^11.0"
            dependency-version: prefer-lowest
          # Exclude prefer-lowest for Laravel 13 due to Pest/PHPUnit compatibility
          - php: 8.3
            laravel: "^13.0"
            dependency-version: prefer-lowest
          - php: 8.4
            laravel: "^13.0"
            dependency-version: prefer-lowest

    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }} - Dependency Version ${{ matrix.dependency-version }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, pdo_mysql, zip, bcmath, curl, json, fileinfo
          coverage: none

      - name: Install Dependencies
        run: |
          composer require "laravel/framework:${{ matrix.laravel }}" --no-update --no-interaction
          composer update --${{ matrix.dependency-version }} --no-interaction --prefer-dist

      - name: Run Tests
        run: |
          vendor/bin/pest --parallel
